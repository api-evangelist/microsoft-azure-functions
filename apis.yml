    description: >-
      Azure Functions provides serverless compute for running event-driven code triggered
      by HTTP requests, timers, queues, blobs, and other Azure services. The management
      API enables creating and configuring function apps, deployment slots, application
      settings, and scaling rules through Azure Resource Manager.
