aid: microsoft-azure-functions
name: Microsoft Azure Functions
description: >-
  Azure Functions is a serverless compute platform from Microsoft Azure enabling
  event-driven code execution triggered by HTTP requests, timers, queues, blobs,
  and other Azure services. The Azure Functions management API provides programmatic
  access to function app lifecycle management, deployment, configuration, scaling,
  and monitoring through Azure Resource Manager.
type: Index
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/microsoft-azure-functions/refs/heads/main/apis.yml
created: '2024-01-01'
modified: '2026-04-17'
specificationVersion: '0.19'
tags:
